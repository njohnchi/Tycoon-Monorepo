name: Build & OpenAPI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          
      - name: Install pnpm
        run: npm install -g pnpm
        
      - name: Install dependencies
        run: pnpm install
        
      - name: Lint
        run: npm run lint
        
      - name: Build
        run: npm run build
        
      - name: Generate OpenAPI spec
        run: npm run codegen
        
      - name: Upload openapi.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi.json
          retention-days: 30
          
      - name: Run tests
        run: npm run test:cov
