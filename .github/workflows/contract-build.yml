name: Contract Build & Hash

on:
  push:
    branches: [main, master, contract]
    paths:
      - 'contract/**'
  pull_request:
    branches: [main, master, contract]
    paths:
      - 'contract/**'

jobs:
  build-and-hash:
    name: Build WASM + Generate Hashes
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contract

      - name: Install stellar CLI
        run: |
          cargo install --locked stellar-cli --features opt 2>/dev/null || true
          # Fallback: use cargo build directly if stellar-cli unavailable
          echo "stellar-cli install attempted"

      - name: Build all contracts (release)
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contract

      - name: Check WASM size budget (fail on regression)
        run: bash scripts/check-wasm-sizes.sh
        working-directory: contract

      - name: Run tests
        run: cargo test --all
        working-directory: contract

      - name: Run cross-contract integration tests
        run: cargo test --package tycoon-integration-tests -- --nocapture
        working-directory: contract

      - name: Generate SHA-256 hashes for all WASM artifacts
        id: hash
        run: |
          set -e
          HASH_FILE="contract/deploy/wasm-hashes.txt"
          mkdir -p contract/deploy
          echo "# WASM SHA-256 Hashes" > "$HASH_FILE"
          echo "# Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$HASH_FILE"
          echo "# Commit: $GITHUB_SHA" >> "$HASH_FILE"
          echo "# Branch: $GITHUB_REF_NAME" >> "$HASH_FILE"
          echo "" >> "$HASH_FILE"

          # Search both possible wasm output directories
          for WASM in $(find contract/target -name "*.wasm" -path "*/release/*" | sort); do
            NAME=$(basename "$WASM")
            HASH=$(sha256sum "$WASM" | awk '{print $1}')
            echo "$HASH  $NAME" >> "$HASH_FILE"
            echo "::notice title=WASM Hash::$NAME: $HASH"
          done

          cat "$HASH_FILE"

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts-${{ github.sha }}
          path: |
            contract/target/**/release/*.wasm
            contract/deploy/wasm-hashes.txt
            contract/deploy/wasm-size-report.md
          retention-days: 90
          if-no-files-found: error

      - name: Comment hash + size diff on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const hashFile = 'contract/deploy/wasm-hashes.txt';
            const sizeFile = 'contract/deploy/wasm-size-report.md';
            let body = '';
            if (fs.existsSync(hashFile)) {
              const content = fs.readFileSync(hashFile, 'utf8');
              body += `## 📦 WASM Build Hashes\n\nVerify these match the artifact you deploy.\n\n\`\`\`\n${content}\n\`\`\`\n\n`;
            }
            if (fs.existsSync(sizeFile)) {
              const sizes = fs.readFileSync(sizeFile, 'utf8');
              body += `## 📏 WASM size vs baseline\n\n${sizes}\n\n`;
            }
            body += `**Artifact:** \`wasm-artifacts-${{ github.sha }}\`\nDownload from the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
