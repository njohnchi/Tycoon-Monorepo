name: CI

on:
  push:
    branches: [main, master, contract, user]
  pull_request:
    branches: [main, master, contract, user]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Run tests
        run: npm test -- run
        working-directory: frontend

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Run unit tests
        run: npm test
        working-directory: backend
        env:
          NODE_ENV: test

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: backend
        env:
          NODE_ENV: test
        continue-on-error: true

  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contract

      - name: Build
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contract

      - name: Run tests
        run: cargo test --all
        working-directory: contract

  admin-user-management:
    name: Admin User Management
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install
        working-directory: backend/src/User Management (Admin)

      - name: Run unit tests
        run: npm test
        working-directory: backend/src/User Management (Admin)

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: backend/src/User Management (Admin)
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: test_db
          JWT_SECRET: test-secret-key

      - name: Generate coverage report
        run: npm run test:cov
        working-directory: backend/src/User Management (Admin)

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
